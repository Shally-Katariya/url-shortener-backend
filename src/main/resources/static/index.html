<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snip — URL Shortener</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.15);
    --accent: #7fff6e;
    --accent-dim: rgba(127,255,110,0.12);
    --accent-glow: rgba(127,255,110,0.25);
    --text: #f0f0f0;
    --text-muted: #666680;
    --text-dim: #3a3a50;
    --danger: #ff5f6e;
    --warning: #ffbb33;
    --font-display: 'Syne', sans-serif;
    --font-mono: 'DM Mono', monospace;
  }

  html { font-size: 16px; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-display);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 0 20px 80px;
    position: relative;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
    z-index: 0;
    mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, black 20%, transparent 80%);
  }

  /* Top accent glow */
  body::after {
    content: '';
    position: fixed;
    top: -120px;
    left: 50%;
    transform: translateX(-50%);
    width: 600px;
    height: 300px;
    background: radial-gradient(ellipse, var(--accent-glow) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 680px;
    padding-top: 80px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 52px;
    animation: fadeUp 0.6s ease both;
  }

  .logo-mark {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 20px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-icon svg { width: 16px; height: 16px; }

  .logo-text {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
  }

  h1 {
    font-size: clamp(32px, 6vw, 52px);
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -0.03em;
    color: var(--text);
    margin-bottom: 12px;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    font-size: 14px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    letter-spacing: 0.02em;
  }

  /* Main card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    margin-bottom: 16px;
    animation: fadeUp 0.6s ease 0.1s both;
    transition: border-color 0.3s;
  }

  .card:hover { border-color: var(--border-hover); }

  .card-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .card-label::before {
    content: '';
    width: 16px;
    height: 1px;
    background: var(--accent);
    display: block;
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: stretch;
  }

  .url-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    min-width: 0;
  }

  .url-input::placeholder { color: var(--text-dim); }

  .url-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }

  .btn {
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    border-radius: 12px;
    padding: 14px 24px;
    font-family: var(--font-display);
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    letter-spacing: 0.02em;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn:hover {
    transform: translateY(-1px);
    box-shadow: 0 4px 20px var(--accent-glow);
  }

  .btn:active { transform: translateY(0); }

  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

  .btn-ghost {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    padding: 10px 18px;
    font-size: 13px;
  }

  .btn-ghost:hover { background: var(--surface2); box-shadow: none; color: var(--text); }

  /* Result area */
  .result-area {
    margin-top: 20px;
    display: none;
  }

  .result-area.visible { display: block; animation: fadeUp 0.35s ease both; }

  .result-box {
    background: var(--accent-dim);
    border: 1px solid rgba(127,255,110,0.25);
    border-radius: 12px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .result-url {
    font-family: var(--font-mono);
    font-size: 14px;
    color: var(--accent);
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .copy-btn {
    background: var(--accent);
    color: #0a0a0f;
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    font-family: var(--font-display);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
    flex-shrink: 0;
  }

  .copy-btn:hover { opacity: 0.85; }
  .copy-btn.copied { background: var(--text-muted); }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 14px;
    margin: 6px 0;
    animation: fadeUp 0.6s ease 0.15s both;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .divider span {
    font-size: 11px;
    color: var(--text-dim);
    font-family: var(--font-mono);
    letter-spacing: 0.08em;
  }

  /* Stats card */
  .stats-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    animation: fadeUp 0.6s ease 0.2s both;
    transition: border-color 0.3s;
  }

  .stats-card:hover { border-color: var(--border-hover); }

  .stats-result {
    margin-top: 20px;
    display: none;
  }

  .stats-result.visible { display: block; animation: fadeUp 0.35s ease both; }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 16px;
  }

  .stat-tile {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    text-align: center;
  }

  .stat-tile .stat-val {
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    display: block;
    margin-bottom: 4px;
  }

  .stat-tile .stat-lbl {
    font-size: 11px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    letter-spacing: 0.06em;
  }

  .original-url-display {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-muted);
    word-break: break-all;
  }

  .original-url-display span {
    color: var(--text-dim);
    font-size: 11px;
    display: block;
    margin-bottom: 4px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* Error */
  .error-msg {
    display: none;
    margin-top: 12px;
    font-size: 12px;
    font-family: var(--font-mono);
    color: var(--danger);
    padding: 10px 14px;
    background: rgba(255,95,110,0.08);
    border: 1px solid rgba(255,95,110,0.2);
    border-radius: 8px;
  }

  .error-msg.visible { display: block; animation: fadeUp 0.3s ease both; }

  /* Loader */
  .loader {
    display: none;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(10,10,15,0.3);
    border-top-color: #0a0a0f;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  .loader.visible { display: block; }

  /* Footer stats bar */
  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-top: 32px;
    animation: fadeUp 0.6s ease 0.3s both;
  }

  .bar-stat {
    text-align: center;
  }

  .bar-stat .num {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
    display: block;
  }

  .bar-stat .lbl {
    font-size: 11px;
    color: var(--text-muted);
    font-family: var(--font-mono);
    letter-spacing: 0.06em;
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Tooltip */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 4px 10px;
    font-size: 11px;
    color: var(--text-muted);
    font-family: var(--font-mono);
  }

  .badge-dot {
    width: 6px;
    height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s ease infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Responsive */
  @media (max-width: 520px) {
    .wrapper { padding-top: 48px; }
    .card, .stats-card { padding: 20px; }
    .input-row { flex-direction: column; }
    .btn { justify-content: center; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .stats-bar { gap: 20px; }
    h1 { font-size: 28px; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <!-- Header -->
  <header class="header">
    <div class="logo-mark">
      <div class="logo-icon">
        <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M3 8h10M8 3l5 5-5 5" stroke="#0a0a0f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="logo-text">Snip</span>
    </div>
    <h1>Short links.<br><span>Big impact.</span></h1>
    <p class="subtitle">// distributed · cached · blazing fast</p>
  </header>

  <!-- Shorten Card -->
  <div class="card">
    <div class="card-label">Shorten a URL</div>
    <div class="input-row">
      <input
        class="url-input"
        id="longUrl"
        type="url"
        placeholder="https://your-very-long-url.com/goes/here"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="btn" id="shortenBtn" onclick="handleShorten()">
        <span class="loader" id="shortenLoader"></span>
        <span id="shortenBtnText">Shorten</span>
      </button>
    </div>

    <div class="error-msg" id="shortenError"></div>

    <div class="result-area" id="shortenResult">
      <div class="result-box">
        <span class="result-url" id="shortUrlDisplay"></span>
        <button class="copy-btn" id="copyBtn" onclick="copyUrl()">Copy</button>
      </div>
      <div style="display:flex; align-items:center; gap:10px; margin-top:10px; justify-content:space-between;">
        <div class="badge">
          <div class="badge-dot"></div>
          <span id="cacheStatus">cached · ready</span>
        </div>
        <button class="btn btn-ghost" onclick="resetShorten()">New link</button>
      </div>
    </div>
  </div>

  <div class="divider"><span>analytics</span></div>

  <!-- Stats Card -->
  <div class="stats-card">
    <div class="card-label">Link analytics</div>
    <div class="input-row">
      <input
        class="url-input"
        id="shortCode"
        type="text"
        placeholder="Enter short code — e.g. aB3xY9"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="btn" id="statsBtn" onclick="handleStats()">
        <span class="loader" id="statsLoader"></span>
        <span id="statsBtnText">Get Stats</span>
      </button>
    </div>

    <div class="error-msg" id="statsError"></div>

    <div class="stats-result" id="statsResult">
      <div class="stats-grid">
        <div class="stat-tile">
          <span class="stat-val" id="statClicks">—</span>
          <span class="stat-lbl">total clicks</span>
        </div>
        <div class="stat-tile">
          <span class="stat-val" id="statCreated">—</span>
          <span class="stat-lbl">days active</span>
        </div>
        <div class="stat-tile">
          <span class="stat-val" id="statAvg">—</span>
          <span class="stat-lbl">clicks / day</span>
        </div>
      </div>
      <div class="original-url-display">
        <span>Original URL</span>
        <div id="statOriginalUrl"></div>
      </div>
    </div>
  </div>

  <!-- Footer stat bar -->
  <div class="stats-bar">
    <div class="bar-stat">
      <span class="num">~2ms</span>
      <span class="lbl">cache hit</span>
    </div>
    <div class="bar-stat">
      <span class="num">Redis</span>
      <span class="lbl">cache layer</span>
    </div>
    <div class="bar-stat">
      <span class="num">Kafka</span>
      <span class="lbl">event stream</span>
    </div>
    <div class="bar-stat">
      <span class="num">JWT</span>
      <span class="lbl">auth</span>
    </div>
  </div>

</div>

<script>
  // ── Exact same API endpoints & field names as your original file ──
  // POST /api/urls          body: { longUrl }   response: { shortUrl }
  // GET  /api/urls/:code/stats                  response: { clickCount, longUrl }

  let currentShortUrl = '';

  async function handleShorten() {
    const longUrl = document.getElementById('longUrl').value.trim();
    if (!longUrl) return showShortenError('Please enter a URL');
    if (!isValidUrl(longUrl)) return showShortenError('Enter a valid URL starting with http:// or https://');

    setLoading('shorten', true);
    hideShortenError();

    try {
      const res = await fetch('/api/urls', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ longUrl })
      });

      if (!res.ok) throw new Error('Server error: ' + res.status);
      const data = await res.json();
      currentShortUrl = data.shortUrl;

      document.getElementById('shortUrlDisplay').textContent = currentShortUrl;
      document.getElementById('cacheStatus').textContent = 'cached · ready';
      document.getElementById('shortenResult').classList.add('visible');
      document.getElementById('longUrl').style.display = 'none';
      document.getElementById('shortenBtn').style.display = 'none';
    } catch (e) {
      showShortenError(e.message || 'Something went wrong. Is your backend running?');
    } finally {
      setLoading('shorten', false);
    }
  }

  async function handleStats() {
    const code = document.getElementById('shortCode').value.trim();
    if (!code) return showStatsError('Please enter a short code');

    setLoading('stats', true);
    hideStatsError();
    document.getElementById('statsResult').classList.remove('visible');

    try {
      const res = await fetch(`/api/urls/${code}/stats`);
      if (!res.ok) throw new Error('Short code not found');
      const data = await res.json();
      populateStats(data);
    } catch (e) {
      showStatsError(e.message || 'Could not fetch stats. Check the short code.');
    } finally {
      setLoading('stats', false);
    }
  }

  function populateStats(data) {
    // data.clickCount  → total clicks
    // data.longUrl     → original URL
    // data.createdAt   → optional, used for days active calc
    const clicks = data.clickCount ?? 0;
    let daysActive = 1;
    if (data.createdAt) {
      daysActive = Math.max(1, Math.round((Date.now() - new Date(data.createdAt)) / 86400000));
    }
    const avg = (clicks / daysActive).toFixed(1);

    document.getElementById('statClicks').textContent = clicks.toLocaleString();
    document.getElementById('statCreated').textContent = daysActive;
    document.getElementById('statAvg').textContent = avg;
    document.getElementById('statOriginalUrl').textContent = data.longUrl || '—';
    document.getElementById('statsResult').classList.add('visible');
  }

  function copyUrl() {
    navigator.clipboard.writeText(currentShortUrl).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
    }).catch(() => {
      // Fallback for non-https
      const ta = document.createElement('textarea');
      ta.value = currentShortUrl;
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    });
  }

  function resetShorten() {
    document.getElementById('shortenResult').classList.remove('visible');
    document.getElementById('longUrl').style.display = '';
    document.getElementById('shortenBtn').style.display = '';
    document.getElementById('longUrl').value = '';
    document.getElementById('longUrl').focus();
  }

  function setLoading(type, on) {
    if (type === 'shorten') {
      document.getElementById('shortenLoader').classList.toggle('visible', on);
      document.getElementById('shortenBtnText').textContent = on ? '' : 'Shorten';
      document.getElementById('shortenBtn').disabled = on;
    } else {
      document.getElementById('statsLoader').classList.toggle('visible', on);
      document.getElementById('statsBtnText').textContent = on ? '' : 'Get Stats';
      document.getElementById('statsBtn').disabled = on;
    }
  }

  function showShortenError(msg) {
    const el = document.getElementById('shortenError');
    el.textContent = '⚠ ' + msg;
    el.classList.add('visible');
  }
  function hideShortenError() { document.getElementById('shortenError').classList.remove('visible'); }
  function showStatsError(msg) {
    const el = document.getElementById('statsError');
    el.textContent = '⚠ ' + msg;
    el.classList.add('visible');
  }
  function hideStatsError() { document.getElementById('statsError').classList.remove('visible'); }

  function isValidUrl(str) {
    try { return ['http:', 'https:'].includes(new URL(str).protocol); }
    catch { return false; }
  }

  // Enter key support
  document.getElementById('longUrl').addEventListener('keydown', e => { if (e.key === 'Enter') handleShorten(); });
  document.getElementById('shortCode').addEventListener('keydown', e => { if (e.key === 'Enter') handleStats(); });
</script>
</body>
</html>
